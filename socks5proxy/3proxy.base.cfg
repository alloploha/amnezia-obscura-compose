#!/bin/3proxy
nscache 65536
nscache6 65536
timeouts 1 5 30 60 180 1800 15 60
log /dev/stdout
logformat "-\""+_G{""time_unix"":%t, ""proxy"":{""type"":""%N"", ""port"":%p}, ""error"":{""code"":""%E""}, ""auth"":{""user"":""%U""}, ""client"":{""ip"":""%C"", ""port"":%c}, ""server"":{""ip"":""%R"", ""port"":%r}, ""bytes"":{""sent"":%O, ""received"":%I}, ""request"":{""hostname"":""%n""}, ""message"":""%T""}"
