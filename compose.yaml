name: obscura

networks:
  dns:
    name: obscura-dns
    driver: bridge
    enable_ipv6: 'true'
    ipam:
      config:
        - subnet: 172.30.153.0/26
        - subnet: fd30:153::/64

volumes:
  awg-data:
    driver: local
  socks5proxy-data:
    driver: local
  xray-data:
    driver: local

services:

  dns:
    build: ./dns
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    networks:
      dns:
        ipv4_address: 172.30.153.53
        ipv6_address: fd30:153::53

  socks5proxy:
    profiles: ["socks5proxy"]
    build: ./socks5proxy
    restart: unless-stopped
    depends_on:
      - dns
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    healthcheck:
      test: ["CMD", "/opt/obscura/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      SOCKS5_ALLOW_ANONYMOUS: ${SOCKS5_ALLOW_ANONYMOUS:-false}
      SOCKS5_COMPAT_CONFIG: ${SOCKS5_COMPAT_CONFIG:-}
      SOCKS5_DNS_SERVERS: ${SOCKS5_DNS_SERVERS:-172.30.153.53,fd30:153::53}
      SOCKS5_EXTERNAL_ADDR: ${SOCKS5_EXTERNAL_ADDR:-}
      SOCKS5_EXTERNAL_ADDR_V4: ${SOCKS5_EXTERNAL_ADDR_V4:-}
      SOCKS5_EXTERNAL_ADDR_V6: ${SOCKS5_EXTERNAL_ADDR_V6:-}
      SOCKS5_LISTEN_ADDR: ${SOCKS5_LISTEN_ADDR:-::}
      SOCKS5_PUBLISHED_PORT: ${SOCKS5_PUBLISHED_PORT:-1080}
      SOCKS5_PUBLISH_MODE: bridge
      SOCKS5_RESOLVE_MODE: ${SOCKS5_RESOLVE_MODE:-prefer_ipv6}
      SOCKS5_STATE_DIR: ${SOCKS5_STATE_DIR:-/var/lib/obscura/socks5proxy}
    ports:
      - "${SOCKS5_PUBLISHED_PORT:-1080}:1080/tcp"
    networks:
      - dns
    volumes:
      - socks5proxy-data:${SOCKS5_STATE_DIR:-/var/lib/obscura/socks5proxy}

  awg:
    profiles: ["awg"]
    build: ./awg
    restart: unless-stopped
    depends_on:
      - dns
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    healthcheck:
      test: ["CMD", "/opt/obscura/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      AWG_COMPAT_STATE_DIR: ${AWG_COMPAT_STATE_DIR:-}
      AWG_INTERFACE: ${AWG_INTERFACE:-awg0}
      AWG_LISTEN_PORT: ${AWG_LISTEN_PORT:-55424}
      AWG_PUBLISHED_PORT: ${AWG_PUBLISHED_PORT:-55424}
      AWG_SUBNET_ADDRESS: ${AWG_SUBNET_ADDRESS:-10.8.1.0}
      AWG_SUBNET_CIDR: ${AWG_SUBNET_CIDR:-24}
      AWG_SERVER_ADDRESS: ${AWG_SERVER_ADDRESS:-}
      AWG_PRIMARY_DNS: ${AWG_PRIMARY_DNS:-172.30.153.53}
      AWG_SECONDARY_DNS: ${AWG_SECONDARY_DNS:-fd30:153::53}
      AWG_MTU: ${AWG_MTU:-1376}
      AWG_NAT_ENABLED: ${AWG_NAT_ENABLED:-true}
      AWG_STATE_DIR: ${AWG_STATE_DIR:-/var/lib/obscura/awg}
      AWG_JUNK_PACKET_COUNT: ${AWG_JUNK_PACKET_COUNT:-3}
      AWG_JUNK_PACKET_MIN_SIZE: ${AWG_JUNK_PACKET_MIN_SIZE:-10}
      AWG_JUNK_PACKET_MAX_SIZE: ${AWG_JUNK_PACKET_MAX_SIZE:-30}
      AWG_INIT_PACKET_JUNK_SIZE: ${AWG_INIT_PACKET_JUNK_SIZE:-15}
      AWG_RESPONSE_PACKET_JUNK_SIZE: ${AWG_RESPONSE_PACKET_JUNK_SIZE:-18}
      AWG_COOKIE_REPLY_PACKET_JUNK_SIZE: ${AWG_COOKIE_REPLY_PACKET_JUNK_SIZE:-20}
      AWG_TRANSPORT_PACKET_JUNK_SIZE: ${AWG_TRANSPORT_PACKET_JUNK_SIZE:-23}
      AWG_INIT_PACKET_MAGIC_HEADER: ${AWG_INIT_PACKET_MAGIC_HEADER:-1020325451}
      AWG_RESPONSE_PACKET_MAGIC_HEADER: ${AWG_RESPONSE_PACKET_MAGIC_HEADER:-3288052141}
      AWG_UNDERLOAD_PACKET_MAGIC_HEADER: ${AWG_UNDERLOAD_PACKET_MAGIC_HEADER:-1766607858}
      AWG_TRANSPORT_PACKET_MAGIC_HEADER: ${AWG_TRANSPORT_PACKET_MAGIC_HEADER:-2528465083}
      AWG_SPECIAL_JUNK_1: ${AWG_SPECIAL_JUNK_1:-<r 2><b 0x858000010001000000000669636c6f756403636f6d0000010001c00c000100010000105a00044d583737>}
      AWG_SPECIAL_JUNK_2: ${AWG_SPECIAL_JUNK_2:-}
      AWG_SPECIAL_JUNK_3: ${AWG_SPECIAL_JUNK_3:-}
      AWG_SPECIAL_JUNK_4: ${AWG_SPECIAL_JUNK_4:-}
      AWG_SPECIAL_JUNK_5: ${AWG_SPECIAL_JUNK_5:-}
    ports:
      - "${AWG_PUBLISHED_PORT:-55424}:${AWG_LISTEN_PORT:-55424}/udp"
    networks:
      - dns
    volumes:
      - awg-data:${AWG_STATE_DIR:-/var/lib/obscura/awg}

  xray:
    profiles: ["xray"]
    build: ./xray
    restart: unless-stopped
    depends_on:
      - dns
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    healthcheck:
      test: ["CMD", "/opt/obscura/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      XRAY_BOOTSTRAP_CLIENT_FLOW: ${XRAY_BOOTSTRAP_CLIENT_FLOW:-xtls-rprx-vision}
      XRAY_LISTEN_ADDR: ${XRAY_LISTEN_ADDR:-::}
      XRAY_LISTEN_PORT: ${XRAY_LISTEN_PORT:-443}
      XRAY_LOG_LEVEL: ${XRAY_LOG_LEVEL:-warning}
      XRAY_PUBLISHED_PORT: ${XRAY_PUBLISHED_PORT:-443}
      XRAY_SITE_NAME: ${XRAY_SITE_NAME:-www.googletagmanager.com}
      XRAY_STATE_DIR: ${XRAY_STATE_DIR:-/var/lib/obscura/xray}
    ports:
      - "${XRAY_PUBLISHED_PORT:-443}:${XRAY_LISTEN_PORT:-443}/tcp"
    networks:
      - dns
    volumes:
      - xray-data:${XRAY_STATE_DIR:-/var/lib/obscura/xray}
