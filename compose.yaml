name: obscura

networks:
  dns:
    name: obscura-dns
    driver: bridge
    enable_ipv6: 'true'
    ipam:
      config:
        - subnet: 172.30.153.0/26
        - subnet: fd30:153::/64

volumes:
  awg-data:
    driver: local
  socks5proxy-data:
    driver: local
  xray-data:
    driver: local

services:

  dns:
    build: ./dns
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    networks:
      dns:
        ipv4_address: 172.30.153.53
        ipv6_address: fd30:153::53

  socks5proxy:
    profiles: ["socks5proxy"]
    build: ./socks5proxy
    restart: unless-stopped
    depends_on:
      - dns
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    healthcheck:
      test: ["CMD", "/opt/obscura/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      SOCKS5_ALLOW_ANONYMOUS: ${SOCKS5_ALLOW_ANONYMOUS:-false}
      SOCKS5_COMPAT_CONFIG: ${SOCKS5_COMPAT_CONFIG:-}
      SOCKS5_DNS_SERVERS: ${SOCKS5_DNS_SERVERS:-172.30.153.53,fd30:153::53}
      SOCKS5_LISTEN_ADDR: ${SOCKS5_LISTEN_ADDR:-::}
      SOCKS5_PUBLISHED_PORT: ${SOCKS5_PUBLISHED_PORT:-1080}
      SOCKS5_PUBLISH_MODE: bridge
      SOCKS5_RESOLVE_MODE: ${SOCKS5_RESOLVE_MODE:-prefer_ipv6}
      SOCKS5_STATE_DIR: ${SOCKS5_STATE_DIR:-/var/lib/obscura/socks5proxy}
    ports:
      - "${SOCKS5_PUBLISHED_PORT:-1080}:1080/tcp"
    networks:
      - dns
    volumes:
      - socks5proxy-data:${SOCKS5_STATE_DIR:-/var/lib/obscura/socks5proxy}
