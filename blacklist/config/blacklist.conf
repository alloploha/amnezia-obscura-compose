BLACKLIST_BACKEND=auto
BLACKLIST_TARGET=docker-forward
BLACKLIST_RULE_DIRECTION=dst
BLACKLIST_RESOLVER=
BLACKLIST_REQUIRE_NONEMPTY=1
BLACKLIST_ALLOW_STALE_RESTORE=1
BLACKLIST_MAX_STALE_AGE=604800
BLACKLIST_FAIL_IF_ALL_STALE=0
BLACKLIST_STATE_DIR=/var/lib/obscura-blacklist
BLACKLIST_CACHE_DIR=/var/cache/obscura-blacklist
BLACKLIST_IPTABLES_CHAIN=DOCKER-USER
BLACKLIST_NFT_TABLE=inet obscura_blacklist
BLACKLIST_NFT_CHAIN=docker_user
BLACKLIST_SOURCES_DIR=/etc/obscura-blacklist/sources
BLACKLIST_LOG_LEVEL=info
